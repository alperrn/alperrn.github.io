<body>
<div class="top-left-controls">
        <a href="profil.html" class="profile-btn req-auth" id="profileBtnText">?</a>
    </div>
    
    <div class="top-right-controls">
        <button class="icon-btn theme-btn" onclick="toggleTheme()" title="Tema">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        </button>
        <button class="icon-btn menu-btn" onclick="toggleMenu()" title="Menü">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

    <div class="side-menu" id="sideMenu">
        <nav>
            <a href="index.html">Ana Sayfa</a>
            <a href="koc-paneli.html" class="teacher-only">Koç Paneli</a>
            <a href="gorevler.html" class="student-only req-auth">Görevlerim</a>
            <a href="tyt.html" class="student-only">TYT Sayacı</a>
            <a href="ayt.html" class="student-only">AYT Sayacı</a>
            <a href="kronometre.html" class="student-only">Kronometre</a>
            <a href="pomodoro.html" class="student-only">Pomodoro</a>
            <a href="sureler.html" class="student-only req-auth">Tutulan Süreler</a>
            <a href="denemeler.html" class="student-only req-auth">Denemelerim</a>
        </nav>
    </div>
    <div class="container">
        <h1>AYT Sayacı</h1>
        
        <div class="timer-wrapper">
            <svg class="timer-svg" xmlns="http://www.w3.org/2000/svg">
                <rect class="progress-rect" id="progressRect" x="3" y="3" width="calc(100% - 6px)" height="calc(100% - 6px)" rx="15" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"></rect>
            </svg>
            <div class="timer-text" id="display">03:00:00</div>
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn" id="startBtn" onclick="startTimer()">Başlat</button>
            <button class="btn" style="background-color: #f39c12;" onclick="earlySave()">Erken Bitir & Kaydet</button>
            <button class="btn" id="resetBtn" onclick="resetTimer()">Sıfırla</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        let totalSeconds = 180 * 60; // AYT Süresi
        let timePassed = 0;
        let timer = null;
        let isRunning = false;

        function updateDisplay() {
            if(!window.formatTime) return;
            document.getElementById('display').textContent = window.formatTime(totalSeconds - timePassed);
            const rect = document.getElementById('progressRect');
            rect.style.strokeDashoffset = 100 - ((timePassed / totalSeconds) * 100);
        }

        function startTimer() {
            if(isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').textContent = "Devam Ediyor";
            document.getElementById('startBtn').disabled = true;
            
            timer = setInterval(() => {
                if(timePassed < totalSeconds) {
                    timePassed++;
                    updateDisplay();
                } else {
                    clearInterval(timer);
                    window.saveRecordToCloud('AYT', window.formatTime(totalSeconds));
                    alert("Sınav süresi bitti! Kalemleri bırakın. Süreniz geçmişe kaydedildi.");
                    resetTimer(true);
                }
            }, 1000);
        }

        function earlySave() {
            if(timePassed === 0) {
                alert("Henüz süre başlamadı!");
                return;
            }
            if(confirm("Sınavı erken bitirip sadece GEÇEN SÜREYİ kaydetmek istiyor musun?")) {
                clearInterval(timer);
                isRunning = false;
                
                const passedStr = window.formatTime(timePassed);
                if(window.saveRecordToCloud) window.saveRecordToCloud('AYT', passedStr);
                
                alert("Erken bitirdin! Süren (" + passedStr + ") başarıyla kaydedildi.");
                resetTimer(true);
            }
        }

        function resetTimer(force = false) {
            if (!force && timePassed > 0) {
                if(!confirm("Sayacı sıfırlamak istediğine emin misin? (Kaydedilmeyecek!)")) return;
            }
            
            clearInterval(timer);
            isRunning = false;
            timePassed = 0;
            document.getElementById('startBtn').disabled = false;
            document.getElementById('startBtn').textContent = "Başlat";
            updateDisplay();
        }
        
        window.addEventListener('load', () => { setTimeout(updateDisplay, 300); });
    </script>
</body>
</html>
