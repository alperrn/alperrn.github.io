            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>

    <div class="container">
        <h1>🍅 Pomodoro Modu</h1>
        
        <div class="pomodoro-modes" style="margin-bottom: 2rem;">
            <button class="pomo-btn active" id="btn25" onclick="setMode(25, 5)">25 Dk Odak / 5 Dk Mola</button>
            <button class="pomo-btn" id="btn60" onclick="setMode(60, 10)">60 Dk Odak / 10 Dk Mola</button>
        </div>
        
        <div class="timer-wrapper">
            <svg class="timer-svg" xmlns="http://www.w3.org/2000/svg">
                <rect class="progress-rect" id="pomoRect" x="3" y="3" width="calc(100% - 6px)" height="calc(100% - 6px)" rx="15" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100"></rect>
            </svg>
            <div class="timer-text" id="pomoDisplay">25:00</div>
        </div>

        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
            <button class="btn" id="startBtn" onclick="startTimer()">Başlat</button>
            <button class="btn" onclick="resetTimer()">Sıfırla</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>
        let currentFocusTime = 25 * 60;
        let currentBreakTime = 5 * 60;
        let totalSeconds = 25 * 60;
        let timePassed = 0;
        let timer = null;
        let isRunning = false;
        let isBreakMode = false; // Şu an molada mıyız?

        function setMode(focusMin, breakMin) {
            if(isRunning && !confirm("Mevcut sayaç sıfırlanacak, emin misin?")) return;
            
            clearInterval(timer); isRunning = false; isBreakMode = false;
            currentFocusTime = focusMin * 60;
            currentBreakTime = breakMin * 60;
            totalSeconds = currentFocusTime;
            timePassed = 0;
            
            document.getElementById('btn25').classList.remove('active');
            document.getElementById('btn60').classList.remove('active');
            if(focusMin === 25) document.getElementById('btn25').classList.add('active');
            else document.getElementById('btn60').classList.add('active');
            
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').textContent = "Başlat";
            updateDisplay();
        }

        function updateDisplay() {
            let remain = totalSeconds - timePassed;
            let m = Math.floor(remain / 60); let s = remain % 60;
            document.getElementById('pomoDisplay').textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            const rect = document.getElementById('pomoRect');
            rect.style.strokeDashoffset = 100 - ((timePassed / totalSeconds) * 100);
        }

        function startTimer() {
            if(isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').style.display = 'none';
            
            timer = setInterval(() => {
                if(timePassed < totalSeconds) {
                    timePassed++; updateDisplay();
                } else {
                    clearInterval(timer); isRunning = false; playAlarm();
                    
                    if(!isBreakMode) { // Odak bittiyse
                        const focusStr = window.formatTime(currentFocusTime);
                        if(window.saveRecordToCloud) window.saveRecordToCloud('Pomodoro', focusStr);
                        
                        // Mola başlasın mı diye sor
                        const startBreak = confirm(`Harika! Odaklanma süren bitti ve kaydedildi.\n${currentBreakTime/60} Dakikalık mola başlatılsın mı?`);
                        if(startBreak) {
                            isBreakMode = true; timePassed = 0; totalSeconds = currentBreakTime;
                            startTimer(); // Molayı hemen başlat
                        } else { resetTimer(); }
                    } else { // Mola bittiyse
                        alert("Mola bitti! Yeni bir odaklanma seansına başlamaya hazırsın.");
                        isBreakMode = false; resetTimer();
                    }
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timer); isRunning = false; timePassed = 0;
            totalSeconds = currentFocusTime; isBreakMode = false;
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('startBtn').textContent = "Başlat";
            updateDisplay();
        }

        function playAlarm() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime);
            osc.connect(ctx.destination);
            osc.start(); osc.stop(ctx.currentTime + 1.5);
        }
        window.addEventListener('load', updateDisplay);
    </script>
</body>
</html>
